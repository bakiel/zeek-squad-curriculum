<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reduce Reuse Recycle - Zeek Squad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #16a34a 0%, #4ade80 100%);
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 15px; }
        .header h1 { font-size: 1.8rem; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
        .start-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #16a34a 0%, #4ade80 100%);
            z-index: 2000; display: flex; justify-content: center;
            align-items: center; flex-direction: column;
            text-align: center; padding: 20px;
        }
        .start-screen.hidden { display: none; }
        .start-screen h1 { color: white; font-size: 2.5rem; margin-bottom: 20px; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
        .start-screen .mascot-big { font-size: 8rem; margin: 20px 0; animation: bounce 1s ease-in-out infinite; }
        .start-screen p { color: white; font-size: 1.3rem; margin-bottom: 30px; }
        .start-btn {
            padding: 20px 50px; font-size: 1.5rem;
            background: white; color: #16a34a;
            border: none; border-radius: 30px; cursor: pointer;
            font-family: inherit; font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .progress-bar-container { background:rgba(255,255,255,0.3); border-radius:15px; height:20px; margin-bottom:15px; overflow:hidden; }
        .progress-bar { height:100%; background:linear-gradient(90deg,#fbbf24,#f59e0b); border-radius:15px; width:0%; transition:width 0.5s ease; }
        .stars { text-align:center; font-size:2.5rem; margin-bottom:15px; }
        .star { color:rgba(255,255,255,0.3); transition:all 0.5s; display:inline-block; }
        .star.earned { color:#fbbf24; filter:drop-shadow(0 0 10px #fbbf24); animation:starPop 0.5s ease; }
        @keyframes starPop { 0%{transform:scale(0) rotate(-180deg)} 50%{transform:scale(1.4) rotate(20deg)} 100%{transform:scale(1) rotate(0)} }
        .mascot-area { display:flex; align-items:center; gap:15px; margin-bottom:20px; }
        .mascot { font-size:4rem; animation:bounce 1s ease-in-out infinite; }
        .mascot.speaking { animation:talk 0.3s ease-in-out infinite; }
        @keyframes talk { 0%,100%{transform:scale(1) rotate(0)} 25%{transform:scale(1.1) rotate(-5deg)} 75%{transform:scale(1.1) rotate(5deg)} }
        .speech-bubble { background:white; padding:15px 20px; border-radius:20px; position:relative; box-shadow:0 5px 20px rgba(0,0,0,0.2); flex:1; }
        .speech-bubble:before { content:''; position:absolute; left:-12px; top:50%; transform:translateY(-50%); border:12px solid transparent; border-right-color:white; }
        .speech-bubble p { color:#16a34a; font-size:1.1rem; font-weight:bold; }
        .game-container { background:white; border-radius:25px; padding:25px; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
        .choices { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; margin-top:20px; }
        .choice-btn { padding:20px 15px; font-size:1.1rem; border:4px solid #e2e8f0; border-radius:20px; background:#f8fafc; cursor:pointer; transition:all 0.3s; display:flex; flex-direction:column; align-items:center; gap:8px; font-family:inherit; font-weight:bold; color:#334155; }
        .choice-btn:hover { transform:scale(1.05); border-color:#16a34a; }
        .choice-btn.correct { background:#dcfce7; border-color:#22c55e; animation:correctPulse 0.5s ease; }
        .choice-btn.wrong { background:#fee2e2; border-color:#ef4444; animation:shake 0.5s ease; }
        @keyframes correctPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
        .celebration { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; }
        .celebration.show { display:flex; }
        .celebration-content { background:white; padding:40px; border-radius:30px; text-align:center; animation:popIn 0.5s ease; }
        @keyframes popIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
        .celebration-content h2 { color:#16a34a; font-size:2rem; }
        .celebration-content .big-emoji { font-size:5rem; margin:20px 0; }
        .play-again-btn, .home-btn { padding:15px 40px; font-size:1.3rem; background:linear-gradient(135deg,#16a34a,#4ade80); color:white; border:none; border-radius:25px; cursor:pointer; font-family:inherit; font-weight:bold; margin:10px; }
        .home-btn { background:linear-gradient(135deg,#3b82f6,#60a5fa); }
        .sound-toggle { position:fixed; top:15px; right:15px; background:rgba(255,255,255,0.9); border:none; border-radius:50%; width:50px; height:50px; font-size:1.5rem; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.2); z-index:100; }
        .confetti { position:fixed; width:10px; height:10px; top:-10px; z-index:1001; animation:confettiFall 3s linear forwards; }
        @keyframes confettiFall { to { transform:translateY(100vh) rotate(720deg); opacity:0; } }
        
        .question-area { text-align:center; margin-bottom:20px; }
        .big-display { font-size:4rem; color:#16a34a; text-shadow:4px 4px 8px rgba(0,0,0,0.1); margin-bottom:10px; }
        .instruction { font-size:1.1rem; color:#64748b; margin-top:10px; }
        .big-choices { grid-template-columns:1fr 1fr; }
        .choice-btn .emoji { font-size:2.5rem; }
        .choice-btn .label { font-size:1rem; font-weight:bold; color:#334155; }
    
    </style>
</head>
<body>

    <div class="start-screen" id="startScreen">
        <h1>Help the Earth!</h1>
        <div class="mascot-big">🌍</div>
        <p>REDUCE, REUSE, RECYCLE! Let's sort the trash!</p>
        <button class="start-btn" onclick="startGame()">Let's Sort!</button>
    </div>
    <button class="sound-toggle" id="soundToggle">🔊</button>
    <div class="container">
        <div class="header"><h1>🌍 Help the Earth!</h1><p>Sort it into the right bin!</p></div>
        <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="stars"><span class="star" id="star1">⭐</span><span class="star" id="star2">⭐</span><span class="star" id="star3">⭐</span></div>
        
        <div class="mascot-area">
            <div class="mascot" id="mascot">🌱</div>
            <div class="speech-bubble">
                <p id="mascotText">Which bin does this go in?</p>
            </div>
        </div>
        <div class="game-container">
            <div class="question-area" style="text-align:center;">
                <div style="font-size:5rem;margin-bottom:10px;" id="itemEmoji">📰</div>
                <div style="font-size:1.5rem;font-weight:bold;color:#166534;margin-bottom:5px;" id="itemName">Newspaper</div>
                <div class="instruction">Which bin does this go in?</div>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button onclick="checkBin('recycle')" style="flex:1;padding:15px 5px;background:#dbeafe;border:3px solid #3b82f6;border-radius:15px;font-size:1rem;font-weight:bold;color:#1e3a8a;cursor:pointer;font-family:inherit;">
                    ♻️<br>RECYCLE
                </button>
                <button onclick="checkBin('compost')" style="flex:1;padding:15px 5px;background:#dcfce7;border:3px solid #16a34a;border-radius:15px;font-size:1rem;font-weight:bold;color:#166534;cursor:pointer;font-family:inherit;">
                    🌱<br>COMPOST
                </button>
                <button onclick="checkBin('trash')" style="flex:1;padding:15px 5px;background:#fee2e2;border:3px solid #ef4444;border-radius:15px;font-size:1rem;font-weight:bold;color:#991b1b;cursor:pointer;font-family:inherit;">
                    🗑️<br>TRASH
                </button>
            </div>
        </div>
    </div>
    
    <div class="celebration" id="celebration">
        <div class="celebration-content">
            <h2>Earth Hero!</h2>
            <div class="big-emoji">🎉🌍🌱</div>
            <div class="stars">
                <span class="star earned">⭐</span>
                <span class="star earned">⭐</span>
                <span class="star earned">⭐</span>
            </div>
            <button class="play-again-btn" onclick="restartGame()">Play Again!</button>
            <button class="home-btn" onclick="window.location.href='index.html'">Back to Games</button>
        </div>
    </div>
    <script>
        var items=[
            {emoji:'📰',name:'Newspaper',bin:'recycle',reason:'Paper can be recycled into new paper!'},
            {emoji:'🍌',name:'Banana Peel',bin:'compost',reason:'Food scraps go in compost to make soil!'},
            {emoji:'🥤',name:'Plastic Bottle',bin:'recycle',reason:'Plastic bottles can be recycled!'},
            {emoji:'🍎',name:'Apple Core',bin:'compost',reason:'Food waste goes in compost!'},
            {emoji:'📦',name:'Cardboard Box',bin:'recycle',reason:'Cardboard can be recycled!'},
            {emoji:'🩹',name:'Used Bandage',bin:'trash',reason:'Used bandages go in the trash - not safe to recycle!'},
            {emoji:'🥛',name:'Milk Carton',bin:'recycle',reason:'Cartons can be recycled!'},
            {emoji:'🍂',name:'Leaves',bin:'compost',reason:'Leaves compost into great garden soil!'},
            {emoji:'🧴',name:'Empty Shampoo Bottle',bin:'recycle',reason:'Plastic containers can be recycled!'},
            {emoji:'🍕',name:'Pizza Box (greasy)',bin:'trash',reason:'Greasy boxes cannot be recycled - trash!'},
            {emoji:'📚',name:'Old Books',bin:'recycle',reason:'Books and magazines can be recycled or donated!'},
            {emoji:'☕',name:'Coffee Grounds',bin:'compost',reason:'Coffee grounds make great compost!'}
        ];
        var currentRound=0,score=0,totalRounds=8,current=null;
        function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
        var shuffled=[];
        function startGame(){document.getElementById('startScreen').classList.add('hidden');playAudio('recycle-intro');shuffled=shuffle(items);startRound();}
        function startRound(){
            current=shuffled[currentRound%shuffled.length];
            document.getElementById('itemEmoji').textContent=current.emoji;
            document.getElementById('itemName').textContent=current.name;
            document.getElementById('progressBar').style.width=(currentRound/totalRounds*100)+'%';
            document.getElementById('mascotText').textContent='Where does '+current.name+' go?';
            document.querySelectorAll('.game-container button').forEach(function(b){b.disabled=false;b.style.opacity='1';});
        }
        function checkBin(bin){
            document.querySelectorAll('.game-container button').forEach(function(b){b.disabled=true;b.style.opacity='0.7';});
            if(bin===current.bin){
                score++;
                playAudio('recycle-correct');
                document.getElementById('mascotText').textContent='Correct! '+current.reason;
                updateStars(score,totalRounds);
                setTimeout(function(){currentRound++;if(currentRound>=totalRounds)showCelebration();else startRound();},1100);
            } else {
                playAudio('recycle-wrong');
                document.getElementById('mascotText').textContent='Oops! '+current.reason;
                setTimeout(function(){
                    document.querySelectorAll('.game-container button').forEach(function(b){b.disabled=false;b.style.opacity='1';});
                    document.getElementById('mascotText').textContent='Try again! Where does '+current.name+' go?';
                },1200);
            }
        }
        function restartGame(){currentRound=0;score=0;document.getElementById('celebration').classList.remove('show');document.getElementById('progressBar').style.width='0%';document.querySelectorAll('.star').forEach(function(s){s.classList.remove('earned');});shuffled=shuffle(items);startRound();}
        
        var soundEnabled = true;
        var currentAudio = null;
        var audioBase = '../../assets/audio/week5/';
        function playAudio(key) {
            if (!soundEnabled) return;
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            currentAudio = new Audio(audioBase + key + '.mp3');
            currentAudio.play().catch(function(){});
        }
        document.getElementById('soundToggle').addEventListener('click', function() {
            soundEnabled = !soundEnabled;
            this.textContent = soundEnabled ? '🔊' : '🔇';
        });
        function createConfetti() {
            var colors = ['#16a34a','#4ade80','#fbbf24','#22c55e','#3b82f6','#8b5cf6'];
            for (var i=0;i<50;i++) {
                (function(idx) {
                    setTimeout(function() {
                        var c=document.createElement('div'); c.className='confetti';
                        c.style.left=Math.random()*100+'vw';
                        c.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
                        c.style.borderRadius=Math.random()>0.5?'50%':'0';
                        c.style.animationDuration=(2+Math.random()*2)+'s';
                        document.body.appendChild(c);
                        setTimeout(function(){c.remove();},4000);
                    },idx*50);
                })(i);
            }
        }
        function showCelebration() {
            createConfetti();
            playAudio('recycle-complete');
            document.getElementById('celebration').classList.add('show');
        }
        function updateStars(score, total) {
            var t=[Math.ceil(total*0.4),Math.ceil(total*0.7),total];
            for(var i=0;i<3;i++){var el=document.getElementById('star'+(i+1));if(score>=t[i]&&!el.classList.contains('earned')){el.classList.add('earned');playAudio('star');}}
        }
    
    </script>
</body>
</html>
