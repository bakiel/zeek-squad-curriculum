<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tornado! - Zeek Squad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 15px; }
        .header h1 { font-size: 1.8rem; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
        .start-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            z-index: 2000; display: flex; justify-content: center;
            align-items: center; flex-direction: column;
            text-align: center; padding: 20px;
        }
        .start-screen.hidden { display: none; }
        .start-screen h1 { color: white; font-size: 2.5rem; margin-bottom: 20px; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
        .start-screen .mascot-big { font-size: 8rem; margin: 20px 0; animation: bounce 1s ease-in-out infinite; }
        .start-screen p { color: white; font-size: 1.3rem; margin-bottom: 30px; }
        .start-btn {
            padding: 20px 50px; font-size: 1.5rem;
            background: white; color: #6366f1;
            border: none; border-radius: 30px; cursor: pointer;
            font-family: inherit; font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .progress-bar-container { background:rgba(255,255,255,0.3); border-radius:15px; height:20px; margin-bottom:15px; overflow:hidden; }
        .progress-bar { height:100%; background:linear-gradient(90deg,#fbbf24,#f59e0b); border-radius:15px; width:0%; transition:width 0.5s ease; }
        .stars { text-align:center; font-size:2.5rem; margin-bottom:15px; }
        .star { color:rgba(255,255,255,0.3); transition:all 0.5s; display:inline-block; }
        .star.earned { color:#fbbf24; filter:drop-shadow(0 0 10px #fbbf24); animation:starPop 0.5s ease; }
        @keyframes starPop { 0%{transform:scale(0) rotate(-180deg)} 50%{transform:scale(1.4) rotate(20deg)} 100%{transform:scale(1) rotate(0)} }
        .mascot-area { display:flex; align-items:center; gap:15px; margin-bottom:20px; }
        .mascot { font-size:4rem; animation:bounce 1s ease-in-out infinite; }
        .mascot.speaking { animation:talk 0.3s ease-in-out infinite; }
        @keyframes talk { 0%,100%{transform:scale(1) rotate(0)} 25%{transform:scale(1.1) rotate(-5deg)} 75%{transform:scale(1.1) rotate(5deg)} }
        .speech-bubble { background:white; padding:15px 20px; border-radius:20px; position:relative; box-shadow:0 5px 20px rgba(0,0,0,0.2); flex:1; }
        .speech-bubble:before { content:''; position:absolute; left:-12px; top:50%; transform:translateY(-50%); border:12px solid transparent; border-right-color:white; }
        .speech-bubble p { color:#6366f1; font-size:1.1rem; font-weight:bold; }
        .game-container { background:white; border-radius:25px; padding:25px; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
        .choices { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; margin-top:20px; }
        .choice-btn { padding:20px 15px; font-size:1.1rem; border:4px solid #e2e8f0; border-radius:20px; background:#f8fafc; cursor:pointer; transition:all 0.3s; display:flex; flex-direction:column; align-items:center; gap:8px; font-family:inherit; font-weight:bold; color:#334155; }
        .choice-btn:hover { transform:scale(1.05); border-color:#6366f1; }
        .choice-btn.correct { background:#dcfce7; border-color:#22c55e; animation:correctPulse 0.5s ease; }
        .choice-btn.wrong { background:#fee2e2; border-color:#ef4444; animation:shake 0.5s ease; }
        @keyframes correctPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
        .celebration { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; }
        .celebration.show { display:flex; }
        .celebration-content { background:white; padding:40px; border-radius:30px; text-align:center; animation:popIn 0.5s ease; }
        @keyframes popIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
        .celebration-content h2 { color:#6366f1; font-size:2rem; }
        .celebration-content .big-emoji { font-size:5rem; margin:20px 0; }
        .play-again-btn, .home-btn { padding:15px 40px; font-size:1.3rem; background:linear-gradient(135deg,#6366f1,#818cf8); color:white; border:none; border-radius:25px; cursor:pointer; font-family:inherit; font-weight:bold; margin:10px; }
        .home-btn { background:linear-gradient(135deg,#3b82f6,#60a5fa); }
        .sound-toggle { position:fixed; top:15px; right:15px; background:rgba(255,255,255,0.9); border:none; border-radius:50%; width:50px; height:50px; font-size:1.5rem; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.2); z-index:100; }
        .confetti { position:fixed; width:10px; height:10px; top:-10px; z-index:1001; animation:confettiFall 3s linear forwards; }
        @keyframes confettiFall { to { transform:translateY(100vh) rotate(720deg); opacity:0; } }
        
        .question-area { text-align:center; margin-bottom:20px; }
        .big-display { font-size:4rem; color:#6366f1; text-shadow:4px 4px 8px rgba(0,0,0,0.1); margin-bottom:10px; }
        .instruction { font-size:1.1rem; color:#64748b; margin-top:10px; }
        .big-choices { grid-template-columns:1fr 1fr; }
        .choice-btn .emoji { font-size:2.5rem; }
        .choice-btn .label { font-size:1rem; font-weight:bold; color:#334155; }
    
    </style>
</head>
<body>

    <div class="start-screen" id="startScreen">
        <h1>Tornado!</h1>
        <div class="mascot-big">🌪️</div>
        <p>A TORNADO spins round and round! WHOOOOSH!</p>
        <button class="start-btn" onclick="startGame()">Let's Learn!</button>
    </div>
    <button class="sound-toggle" id="soundToggle">🔊</button>
    <div class="container">
        <div class="header"><h1>🌪️ Tornado!</h1><p>Spinning columns of air!</p></div>
        <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="stars"><span class="star" id="star1">⭐</span><span class="star" id="star2">⭐</span><span class="star" id="star3">⭐</span></div>
        
        <div class="mascot-area">
            <div class="mascot" id="mascot">🌪️</div>
            <div class="speech-bubble">
                <p id="mascotText">What do you know about tornadoes?</p>
            </div>
        </div>
        <div class="game-container">
            <div class="question-area">
                <div style="font-size:3rem;text-align:center;margin-bottom:10px;" id="qEmoji">🌪️</div>
                <div style="font-size:1.2rem;font-weight:bold;color:#312e81;text-align:center;padding:15px;background:#eef2ff;border-radius:15px;" id="question">What is a tornado?</div>
            </div>
            <div class="choices" id="choices" style="margin-top:15px;"></div>
        </div>
    </div>
    
    <div class="celebration" id="celebration">
        <div class="celebration-content">
            <h2>Tornado Expert!</h2>
            <div class="big-emoji">🎉🌪️🌟</div>
            <div class="stars">
                <span class="star earned">⭐</span>
                <span class="star earned">⭐</span>
                <span class="star earned">⭐</span>
            </div>
            <button class="play-again-btn" onclick="restartGame()">Play Again!</button>
            <button class="home-btn" onclick="window.location.href='index.html'">Back to Games</button>
        </div>
    </div>
    <script>
        var questions=[
            {emoji:'🌪️',q:'What is a TORNADO?',correct:'A spinning column of air touching the ground!',wrong:['A big ocean wave','A thundercloud','A snowstorm']},
            {emoji:'💨',q:'Tornadoes are made of...',correct:'Fast spinning WIND!',wrong:['Rain and thunder','Snow and ice','Sunshine and clouds']},
            {emoji:'🏠',q:'In a tornado, go to...',correct:'A safe room or basement! Stay LOW!',wrong:['The roof or top floor','Outside to watch it','Near a window']},
            {emoji:'🌈',q:'Tornadoes can be...',correct:'Very dangerous with strong winds!',wrong:['Soft and gentle','Fun to play in','Cool and refreshing']},
            {emoji:'🔊',q:'When a tornado is coming, you might hear...',correct:'A loud roaring sound like a train!',wrong:['Birds singing sweetly','Soft music playing','Bells ringing quietly']},
            {emoji:'⛑️',q:'During a tornado warning, you should...',correct:'Cover your head and get low!',wrong:['Stand by the window','Go outside','Keep watching TV']},
        ];
        var currentRound=0,score=0,totalRounds=5,current=null;
        function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
        var shuffled=[];
        function startGame(){document.getElementById('startScreen').classList.add('hidden');shuffled=shuffle(questions);startRound();}
        function startRound(){
            current=shuffled[currentRound%shuffled.length];
            document.getElementById('qEmoji').textContent=current.emoji;
            document.getElementById('question').textContent=current.q;
            document.getElementById('progressBar').style.width=(currentRound/totalRounds*100)+'%';
            document.getElementById('mascotText').textContent='Think carefully!';
            var opts=shuffle([current.correct].concat(current.wrong.slice(0,3)));
            var div=document.getElementById('choices');div.innerHTML='';
            opts.forEach(function(ans){
                var btn=document.createElement('button');btn.className='choice-btn';
                btn.style='font-size:1rem;text-align:left;padding:15px;';btn.textContent=ans;
                btn.onclick=function(){checkAns(btn,ans===current.correct);};
                div.appendChild(btn);
            });
        }
        function checkAns(btn,correct){
            document.querySelectorAll('.choice-btn').forEach(function(b){b.onclick=null;});
            if(correct){
                btn.classList.add('correct');score++;
                document.getElementById('mascotText').textContent='Correct! '+current.correct;
                updateStars(score,totalRounds);
                setTimeout(function(){currentRound++;if(currentRound>=totalRounds)showCelebration();else startRound();},1000);
            } else {
                btn.classList.add('wrong');
                document.getElementById('mascotText').textContent='The answer is: '+current.correct;
                setTimeout(function(){
                    btn.classList.remove('wrong');
                    document.querySelectorAll('.choice-btn').forEach(function(b){var a=b.textContent;b.onclick=function(){checkAns(b,a===current.correct);};}); 
                },1000);
            }
        }
        function restartGame(){currentRound=0;score=0;document.getElementById('celebration').classList.remove('show');document.getElementById('progressBar').style.width='0%';document.querySelectorAll('.star').forEach(function(s){s.classList.remove('earned');});shuffled=shuffle(questions);startRound();}
        
        var soundEnabled = true;
        var currentAudio = null;
        document.getElementById('soundToggle').addEventListener('click', function() {
            soundEnabled = !soundEnabled;
            this.textContent = soundEnabled ? '🔊' : '🔇';
        });
        function createConfetti() {
            var colors = ['#6366f1','#818cf8','#fbbf24','#22c55e','#3b82f6','#8b5cf6'];
            for (var i=0;i<50;i++) {
                (function(idx) {
                    setTimeout(function() {
                        var c=document.createElement('div'); c.className='confetti';
                        c.style.left=Math.random()*100+'vw';
                        c.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
                        c.style.borderRadius=Math.random()>0.5?'50%':'0';
                        c.style.animationDuration=(2+Math.random()*2)+'s';
                        document.body.appendChild(c);
                        setTimeout(function(){c.remove();},4000);
                    },idx*50);
                })(i);
            }
        }
        function showCelebration() {
            createConfetti();
            document.getElementById('celebration').classList.add('show');
        }
        function updateStars(score, total) {
            if (score >= Math.ceil(total*0.4)) document.getElementById('star1').classList.add('earned');
            if (score >= Math.ceil(total*0.7)) document.getElementById('star2').classList.add('earned');
            if (score >= total) document.getElementById('star3').classList.add('earned');
        }
    
    </script>
</body>
</html>
